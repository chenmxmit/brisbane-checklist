const INITIAL_CHECKED = [];
const STORAGE_KEY = 'brisbane-checklist-standalone';

function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify([...checkedIds])); } catch(e) {} }
function getTabItems(k) { return CHECKLIST_ITEMS.filter(i => i.tab === k); }
function getGroupedItems(k) {
  const items = getTabItems(k); const groups = {}; const ungrouped = [];

  return { groups, ungrouped };
}
function getTabProgress(k) { const items = getTabItems(k); if (!items.length) return 0; return Math.round((items.filter(i => checkedIds.has(i.id)).length / items.length) * 100); }
function getTotalProgress() { return Math.round((CHECKLIST_ITEMS.filter(i => checkedIds.has(i.id)).length / CHECKLIST_ITEMS.length) * 100); }
function isTabComplete(k) { const items = getTabItems(k); return items.length > 0 && items.every(i => checkedIds.has(i.id)); }
function renderTabBar() {

    const allDone = ti.length > 0 && td === ti.length;
    const btn = document.createElement('button');

  html += '<div class="flex items-center justify-between mb-5">' +
    '<div class="flex items-center gap-3"><div class="w-12 h-12 rounded-2xl bg-gradient-to-br ' + tabConfig.color + ' flex items-center justify-center text-2xl shadow-md">' + tabConfig.emoji + '</div>' +
    '<div><h2 class="text-xl font-black text-gray-800">' + tabConfig.label + '</h2><p class="text-xs text-gray-500">' + doneCount + ' / ' + tabItems.length + ' done</p></div></div>' +
    '<button id="clearTabBtn" class="flex items-center gap-1.5 bg-white/80 border border-white hover:bg-white text-gray-800 rounded-xl px-3 py-2 text-xs font-semibold transition-all">' +
    '<svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>' +
    '<span>Clear All</span></button></div>';
  html += '<div class="mb-5"><div class="h-3 bg-white/60 rounded-full overflow-hidden"><div class="h-full bg-gradient-to-r ' + tabConfig.color + ' rounded-full anim-progress" style="width:' + progress + '%"></div></div></div>';
  html += '<div class="space-y-4">';
  if (ungrouped.length > 0) { html += '<div class="space-y-2">'; ungrouped.forEach((it, i) => { html += renderItemRow(it, i * 0.03); }); html += '</div>'; }
  let gi = 0;
  for (const [gn, gd] of Object.entries(groups)) {
    const isDF = gn === "Don't Forget!";
    html += '<div class="space-y-2">';
    if (isDF) {
      html += '<div class="flex items-center gap-2 pt-1"><div class="flex items-center gap-2 dont-forget-badge text-white px-3 py-1.5 rounded-full shadow-md"><span class="text-base">' + gd.emoji + '</span><h3 class="text-xs font-black uppercase tracking-wide">' + gn + '</h3><span class="text-base">☀️</span></div></div><div class="space-y-2 p-3 rounded-2xl dont-forget-box">';
    } else {
      html += '<div class="flex items-center gap-2 pt-2"><span class="text-lg">' + gd.emoji + '</span><h3 class="text-sm font-bold text-gray-600 uppercase tracking-wide">' + gn + '</h3></div><div class="space-y-2">';
    }
    gd.items.forEach((it, i) => { html += renderItemRow(it, (gi * 0.05) + (i * 0.03)); });
    html += '</div></div>'; gi++;
  }
  html += '</div>';
  container.innerHTML = html;
  document.getElementById('clearTabBtn').addEventListener('click', clearTab);
  document.querySelectorAll('.check-item').forEach(el => { el.addEventListener('click', () => toggleItem(el.dataset.id)); });
}
function renderOverallProgress() {
  const p = getTotalProgress();
  const d = CHECKLIST_ITEMS.filter(i => checkedIds.has(i.id)).length;
  document.getElementById('totalProgressText').textContent = p + '%';
  document.getElementById('totalProgressBar').style.width = p + '%';
  document.getElementById('totalDoneCount').textContent = d;
  document.getElementById('totalCount').textContent = CHECKLIST_ITEMS.length;
}
function toggleItem(id) { if (checkedIds.has(id)) checkedIds.delete(id); else checkedIds.add(id); saveState(); renderTabContent(); renderOverallProgress(); renderTabBar(); checkCelebration(); }
function clearTab() { getTabItems(activeTab).forEach(i => checkedIds.delete(i.id)); saveState(); renderTabContent(); renderOverallProgress(); renderTabBar(); }
function switchTab(k) { activeTab = k; renderTabBar(); renderTabContent(); }
let celebrationTimer = null;
function checkCelebration() { if (isTabComplete(activeTab)) showCelebration(); }
function showCelebration() {
  const el = document.getElementById('celebration');
  el.classList.remove('hidden', 'hide');
  el.querySelector('div').classList.remove('hide');
  el.querySelector('div').classList.add('celebration');
  if (celebrationTimer) clearTimeout(celebrationTimer);
  celebrationTimer = setTimeout(() => {
    const inner = el.querySelector('div');
    inner.classList.remove('celebration'); inner.classList.add('hide');
    setTimeout(() => { el.classList.add('hidden'); }, 300);
  }, 2500);
}
renderTabBar(); renderTabContent(); renderOverallProgress();
</script>
</body>
</html>
